<!DOCTYPE html>
<html>
<head>
  <title>Bot Trading</title>
  <style>
    body { font-family: Arial; }
    .box { padding:20px; margin:20px; border-radius:10px; }
    .usa { background:#d4f7d4; }
    .europa { background:#f7f3d4; }
  </style>
</head>
<body>

<h1>Bot Trading</h1>

<div class="box usa">
  <h2>🇺🇸 USA (ALPACA)</h2>
  <p>Saldo: <span id="usa-balance"></span></p>
  <ul id="usa-pos"></ul>
  <button onclick="buy('AAPL')">Comprar AAPL</button>
</div>

<div class="box europa">
  <h2>🇪🇺 EUROPA (SIMULADO)</h2>
  <p>Saldo: <span id="europa-balance"></span></p>
  <ul id="europa-pos"></ul>
  <button onclick="buy('REP')">Comprar Repsol</button>
</div>

<script>
async function load() {
  const res = await fetch("/api/state");
  const data = await res.json();

  document.getElementById("usa-balance").innerText = data.usa.balance;

  const usaList = document.getElementById("usa-pos");
  usaList.innerHTML = "";
  data.usa.positions.forEach(p => {
    const li = document.createElement("li");
    li.innerText = p.symbol + " (" + p.qty + ")";
    usaList.appendChild(li);
  });

  document.getElementById("europa-balance").innerText = data.europa.balance;

  const euList = document.getElementById("europa-pos");
  euList.innerHTML = "";
  data.europa.positions.forEach(p => {
    const li = document.createElement("li");
    li.innerText = p.symbol;
    euList.appendChild(li);
  });
}

async function buy(symbol) {
  await fetch("/api/buy", {
    method: "POST",
    body: JSON.stringify({ symbol })
  });
  load();
}

load();
</script>

</body>
</html>
